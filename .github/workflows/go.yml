# This workflow will build a golang project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-go

name: Go

on:
  push:
    branches: ['**']
    tags: ['v*']
  pull_request:
    branches: ['**']

jobs:
  build:
    if: startsWith(github.ref, 'refs/heads/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build
        run: go build -v ./...

      - name: Test
        run: go test -v ./...

  release:
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - name: Build all platforms
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          LDFLAGS="-X github.com/sinbad/lfs-folderstore/cmd.Version=${VERSION}"

          mkdir -p dist

          GOOS=windows GOARCH=amd64 go build -ldflags "${LDFLAGS}" -o dist/windows-amd64/elastic-git-storage.exe
          GOOS=linux   GOARCH=amd64 go build -ldflags "${LDFLAGS}" -o dist/linux-amd64/elastic-git-storage
          GOOS=darwin  GOARCH=amd64 go build -ldflags "${LDFLAGS}" -o dist/darwin-amd64/elastic-git-storage
          GOOS=darwin  GOARCH=arm64 go build -ldflags "${LDFLAGS}" -o dist/darwin-arm64/elastic-git-storage

      - name: Create archives
        run: |
          cd dist
          for dir in */; do
            name="elastic-git-storage-${dir%/}"
            (cd "$dir" && zip -r "../../${name}.zip" .)
          done
          # Bare exe for backward compatibility
          cp windows-amd64/elastic-git-storage.exe ../elastic-git-storage.exe

      - name: Publish release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            elastic-git-storage.exe
            elastic-git-storage-windows-amd64.zip
            elastic-git-storage-linux-amd64.zip
            elastic-git-storage-darwin-amd64.zip
            elastic-git-storage-darwin-arm64.zip
